# DevOpsGuru — drop this file into your nginx sites-available or conf.d directory
# HTTPS on port 443 with SSL certificates
# Nginx proxies by container name (docker network)

# HTTP redirect to HTTPS
server {
    listen 80;
    server_name devopsguru.am www.devopsguru.am;
    return 301 https://$server_name$request_uri;
}

# Main portal — devopsguru.am (HTTPS)
server {
    listen 443 ssl http2;
    server_name devopsguru.am www.devopsguru.am;

    # SSL certificates (Let's Encrypt standard paths)
    ssl_certificate     /etc/letsencrypt/live/devopsguru.am/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devopsguru.am/privkey.pem;

    # SSL configuration
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers  on;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        10m;

    # HSTS — tell browsers to use HTTPS forever
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin" always;

    # Proxy to Next.js app container
    location / {
        proxy_pass         http://devopsguru-app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Static assets — longer cache
    location /_next/static/ {
        proxy_pass         http://devopsguru-app:3000;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# HTTP redirect to HTTPS (admin)
server {
    listen 80;
    server_name admin.devopsguru.am;
    return 301 https://$server_name$request_uri;
}

# Admin panel — admin.devopsguru.am (HTTPS)
server {
    listen 443 ssl http2;
    server_name admin.devopsguru.am;

    # SSL certificates (Let's Encrypt standard paths)
    ssl_certificate     /etc/letsencrypt/live/admin.devopsguru.am/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.devopsguru.am/privkey.pem;

    # SSL configuration
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers  on;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        10m;

    # HSTS — tell browsers to use HTTPS forever
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin" always;

    # Restrict to Cloudflare IPs only (optional but recommended for admin)
    # Uncomment and update if you want to lock down the admin panel:
    # allow 103.21.244.0/22;
    # allow 103.22.200.0/22;
    # allow 103.31.4.0/22;
    # allow 104.16.0.0/13;
    # allow 104.24.0.0/14;
    # allow 108.162.192.0/18;
    # allow 131.0.72.0/22;
    # allow 141.101.64.0/18;
    # allow 162.158.0.0/15;
    # allow 172.64.0.0/13;
    # allow 173.245.48.0/20;
    # allow 188.114.96.0/20;
    # allow 190.93.240.0/20;
    # allow 197.234.240.0/22;
    # allow 198.41.128.0/17;
    # deny all;

    location / {
        proxy_pass         http://devopsguru-admin:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    location /_next/static/ {
        proxy_pass         http://devopsguru-admin:3001;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
