# DevOpsGuru — drop this file into your nginx sites-available or conf.d directory
# Cloudflare Flexible SSL: CF handles HTTPS, origin serves HTTP on port 80
# Nginx proxies by container name (docker network)

# Main portal — devopsguru.am
server {
    listen 80;
    server_name devopsguru.am www.devopsguru.am;

    # Cloudflare real IP (so logs show visitor IP, not CF IP)
    real_ip_header    CF-Connecting-IP;

    # Security headers (CF adds HTTPS, we add the rest)
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin" always;

    # Proxy to Next.js app container
    location / {
        proxy_pass         http://devopsguru-app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Static assets — longer cache
    location /_next/static/ {
        proxy_pass         http://devopsguru-app:3000;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# Admin panel — admin.devopsguru.am
server {
    listen 80;
    server_name admin.devopsguru.am;

    real_ip_header    CF-Connecting-IP;

    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin" always;

    # Restrict to Cloudflare IPs only (optional but recommended for admin)
    # Uncomment and update if you want to lock down the admin panel:
    # allow 103.21.244.0/22;
    # allow 103.22.200.0/22;
    # allow 103.31.4.0/22;
    # allow 104.16.0.0/13;
    # allow 104.24.0.0/14;
    # allow 108.162.192.0/18;
    # allow 131.0.72.0/22;
    # allow 141.101.64.0/18;
    # allow 162.158.0.0/15;
    # allow 172.64.0.0/13;
    # allow 173.245.48.0/20;
    # allow 188.114.96.0/20;
    # allow 190.93.240.0/20;
    # allow 197.234.240.0/22;
    # allow 198.41.128.0/17;
    # deny all;

    location / {
        proxy_pass         http://devopsguru-admin:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    location /_next/static/ {
        proxy_pass         http://devopsguru-admin:3001;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
